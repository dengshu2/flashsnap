<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashSnap ⚡ AI 信息卡生成器</title>
  <meta name="description" content="FlashSnap — 基于 Gemini Flash 的 AI 信息卡生成工具。输入文字，秒生成精美杂志风格信息卡，一键复制到剪贴板。" />
  <link rel="icon" type="image/svg+xml" href="/flash.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div id="app">
    <!-- Main Content -->
    <main class="app-main">
      <!-- Left Panel: Input -->
      <section class="panel panel-input">
        <div class="panel-header">
          <div class="logo">
            <span class="logo-icon">⚡</span>
            <h1>FlashSnap</h1>
          </div>
          <div class="header-right">
            <span class="char-count" id="char-count">0 字</span>
            <a href="https://github.com/dengshu2/flashsnap" target="_blank" rel="noopener noreferrer" class="header-btn"
              title="GitHub" id="btn-github">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z" />
              </svg>
            </a>
            <button id="btn-history" class="header-btn" title="历史记录">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
              </svg>
            </button>
            <button id="btn-settings" class="header-btn" title="设置">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
        <div class="input-wrapper">
          <textarea id="input-text"
            placeholder="输入你想要生成信息卡的内容...&#10;&#10;例如：&#10;• 一段新闻摘要&#10;• 一个技术概念解释&#10;• 一条名人名言&#10;• 产品数据对比"
            spellcheck="false"></textarea>
        </div>
        <div class="input-actions">
          <button id="btn-generate" class="btn btn-primary">
            <span class="btn-icon">✨</span>
            <span class="btn-text">生成卡片</span>
          </button>
          <button id="btn-clear" class="btn btn-ghost" title="清除输入">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" />
            </svg>
          </button>
        </div>
      </section>

      <!-- Right Panel: Preview -->
      <section class="panel panel-preview">
        <div class="panel-header">
          <h2>预览</h2>
          <div class="preview-header-actions">

            <div class="preview-actions" id="preview-actions">
              <button id="btn-copy" class="btn btn-action" title="复制到剪贴板">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                  <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
                </svg>
                <span>复制</span>
              </button>

              <button id="btn-regenerate" class="btn btn-action" title="重新生成">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="23 4 23 10 17 10" />
                  <polyline points="1 20 1 14 7 14" />
                  <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" />
                </svg>
                <span>重试</span>
              </button>
            </div>
          </div>
        </div>
        <div class="preview-container" id="preview-container">
          <!-- Empty State -->
          <div class="empty-state" id="empty-state">
            <div class="empty-icon" style="display: flex; justify-content: center;">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
              </svg>
            </div>
            <p class="empty-title">输入内容，一键生成精美信息卡</p>
            <p class="empty-desc">支持新闻摘要、知识卡片、数据对比等多种场景</p>
          </div>
          <!-- Loading State -->
          <div class="loading-state" id="loading-state" style="display: none;">
            <div class="loading-spinner"></div>
            <p class="loading-text">AI 正在设计你的信息卡...</p>
            <div class="loading-progress" id="loading-progress"></div>
          </div>
          <!-- Preview iframe -->
          <iframe id="preview-frame" sandbox="allow-same-origin" style="display: none;"></iframe>
        </div>
      </section>
    </main>

    <!-- Mobile Tab Bar (fixed bottom) -->
    <nav class="mobile-tab-bar" id="mobile-tab-bar">
      <button class="mobile-tab active" data-tab="input" id="tab-input">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z" />
        </svg>
        <span>输入</span>
      </button>
      <button class="mobile-tab" data-tab="preview" id="tab-preview">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
          <line x1="8" y1="21" x2="16" y2="21" />
          <line x1="12" y1="17" x2="12" y2="21" />
        </svg>
        <span>预览</span>
      </button>
    </nav>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal" style="display: none;">
      <div class="modal">
        <div class="modal-header">
          <h3>⚙️ 设置</h3>
          <button class="modal-close" id="btn-close-settings">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="api-key-input">Gemini API Key</label>
            <p class="form-hint">从 <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Google AI
                Studio</a> 获取你的 API Key</p>
            <div class="input-with-action">
              <input type="password" id="api-key-input" placeholder="输入你的 Gemini API Key..." autocomplete="off" />
              <button id="btn-toggle-key" class="btn btn-ghost btn-sm" title="显示/隐藏">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
            <div class="api-test-row">
              <button id="btn-test-api" class="btn btn-ghost btn-sm">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 11.08V12a10 10 0 11-5.93-9.14" />
                  <polyline points="22 4 12 14.01 9 11.01" />
                </svg>
                <span>测试连接</span>
              </button>
              <span id="api-test-status" class="api-test-status"></span>
            </div>
          </div>
          <div class="form-group">
            <label for="model-select">
              模型选择
              <button id="btn-refresh-models" class="btn-inline" title="刷新模型列表">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="23 4 23 10 17 10" />
                  <polyline points="1 20 1 14 7 14" />
                  <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" />
                </svg>
              </button>
            </label>
            <p class="form-hint" id="model-hint">输入 API Key 后自动获取可用模型</p>
            <select id="model-select">
              <option value="gemini-2.5-flash">Gemini 2.5 Flash（默认）</option>
            </select>
          </div>
          <div class="form-group">
            <label for="base-url-input">API Base URL（可选）</label>
            <p class="form-hint">如需使用代理，可修改此地址。留空使用默认地址。</p>
            <input type="text" id="base-url-input" placeholder="https://generativelanguage.googleapis.com"
              autocomplete="off" />
          </div>
        </div>
        <div class="modal-footer">
          <button id="btn-save-settings" class="btn btn-primary">保存设置</button>
        </div>
      </div>
    </div>

    <!-- History Modal -->
    <div class="modal-overlay" id="history-modal" style="display: none;">
      <div class="modal modal-lg">
        <div class="modal-header">
          <h3>📋 历史记录</h3>
          <div class="modal-header-actions">
            <button id="btn-clear-history" class="btn btn-ghost btn-sm">清空历史</button>
            <button class="modal-close" id="btn-close-history">&times;</button>
          </div>
        </div>
        <div class="modal-body">
          <div id="history-list" class="history-list">
            <p class="empty-desc">暂无历史记录</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
