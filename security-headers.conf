# Shared security headers.
#
# nginx `add_header` inheritance gotcha: a location block that declares ANY
# add_header of its own drops ALL headers inherited from the server block.
# Both locations below add their own Cache-Control, so the security headers
# must be re-declared per location — hence this include file.
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://umami.dengshu.ovh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https: http: blob: data:; img-src 'self' https: data: blob:; frame-src 'self' blob:;" always;
